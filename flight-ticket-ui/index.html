<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ SkyBook · Flight Booking</title>
  <!-- Google Fonts + Font Awesome 6 (free) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #eef5ff 0%, #d6e4f7 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* main glass card */
    .flight-container {
      max-width: 1050px;
      width: 100%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 3.5rem;
      padding: 2.6rem 2.8rem 2.8rem;
      box-shadow: 0 40px 80px -20px rgba(0, 20, 50, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: 0.2s;
    }

    /* header */
    .header-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.2rem;
      border-bottom: 2px solid rgba(0, 80, 200, 0.08);
      padding-bottom: 1.2rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .logo-icon {
      background: linear-gradient(145deg, #0b3b8f, #1a6bdf);
      color: white;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      font-size: 2.1rem;
      box-shadow: 0 12px 24px -6px rgba(26, 115, 232, 0.3);
    }

    .logo-area h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(145deg, #0b2f4f, #1a4f8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-area h1 span {
      font-weight: 300;
      -webkit-text-fill-color: #3d6e9e;
      background: none;
    }

    .header-badge {
      background: rgba(0, 80, 200, 0.08);
      padding: 0.45rem 1.6rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.85rem;
      color: #1a4f8a;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      border: 1px solid rgba(26, 115, 232, 0.12);
    }

    .header-badge i {
      color: #1a6bdf;
    }

    /* booking form grid */
    .booking-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 2rem;
      margin-top: 0.5rem;
    }

    @media (max-width: 820px) {
      .booking-grid {
        grid-template-columns: 1fr;
        gap: 1.8rem;
      }
      .flight-container {
        padding: 1.8rem 1.5rem;
      }
    }

    /* left — form */
    .form-section {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 2.2rem;
      padding: 1.8rem 2rem;
      box-shadow: 0 6px 20px rgba(0, 20, 40, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .form-section h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #0b2f4f;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .form-section h2 i {
      color: #1a6bdf;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #2a4d6e;
      margin-bottom: 0.25rem;
    }

    .form-group input, 
    .form-group select {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(0, 0, 0, 0.06);
      background: white;
      font-size: 0.95rem;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 2px 6px rgba(0,0,0,0.01);
    }

    .form-group input:focus, 
    .form-group select:focus {
      outline: none;
      border-color: #1a6bdf;
      box-shadow: 0 0 0 4px rgba(26, 107, 223, 0.12);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 480px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0.8rem;
      }
      .form-section {
        padding: 1.2rem;
      }
    }

    .book-btn {
      width: 100%;
      background: linear-gradient(145deg, #1a6bdf, #0f4a9e);
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 1rem 1.5rem;
      border-radius: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 12px 28px -8px rgba(26, 107, 223, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: 1.2rem;
    }

    .book-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 18px 36px -8px rgba(26, 107, 223, 0.45);
      background: linear-gradient(145deg, #1557b0, #0d3d7a);
    }

    .book-btn:active {
      transform: scale(0.97);
    }

    /* right — flight summary card */
    .summary-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 2.2rem;
      padding: 1.8rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 6px 20px rgba(0, 20, 40, 0.04);
      display: flex;
      flex-direction: column;
    }

    .summary-card h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #0b2f4f;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .summary-card h2 i {
      color: #1a6bdf;
    }

    .flight-preview {
      background: white;
      border-radius: 1.8rem;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(0,0,0,0.02);
      flex: 1;
    }

    .flight-route {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }

    .flight-route .city {
      font-weight: 700;
      font-size: 1.3rem;
      color: #0b2f4f;
    }

    .flight-route .arrow {
      color: #1a6bdf;
      font-size: 1.2rem;
    }

    .flight-detail-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.02);
      font-size: 0.9rem;
      color: #1e405e;
    }

    .flight-detail-item:last-child {
      border-bottom: none;
    }

    .flight-detail-item .label {
      opacity: 0.7;
    }

    .flight-detail-item .value {
      font-weight: 500;
    }

    .passenger-tag {
      background: #eef4fc;
      border-radius: 60px;
      padding: 0.15rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #1a4f8a;
    }

    /* MODAL overlay (congrats) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      max-width: 460px;
      width: 90%;
      background: white;
      border-radius: 3rem;
      padding: 2.8rem 2.2rem 2.2rem;
      text-align: center;
      box-shadow: 0 50px 80px -20px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .modal-box .icon-big {
      background: #1a6bdf;
      color: white;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      margin: 0 auto 1rem;
      box-shadow: 0 16px 32px -8px rgba(26, 107, 223, 0.3);
    }

    .modal-box h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #0b2f4f;
      margin-bottom: 0.3rem;
    }

    .modal-box p {
      color: #2d4b6a;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .modal-box .ref-code {
      background: #eef4fc;
      border-radius: 60px;
      padding: 0.4rem 1.2rem;
      display: inline-block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1a4f8a;
      margin: 1rem 0 1.2rem;
      letter-spacing: 0.05em;
    }

    .modal-btn {
      background: #1a6bdf;
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.8rem 2.4rem;
      border-radius: 60px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 20px -6px rgba(26, 107, 223, 0.3);
    }

    .modal-btn:hover {
      background: #0f4a9e;
      transform: scale(1.02);
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes slideUp {
      0% { transform: translateY(30px) scale(0.96); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* small */
    .text-muted {
      color: #597a98;
      font-size: 0.75rem;
    }

    .flex-grow {
      flex: 1;
    }
  </style>
</head>
<body>

<div class="flight-container">
  
  <!-- header -->
  <div class="header-row">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-plane-departure"></i></div>
      <h1>Sky<span>Book</span></h1>
    </div>
    <div class="header-badge">
      <i class="fas fa-globe"></i> 12 destinations · live
      <i class="fas fa-circle" style="color: #2ecc71; font-size: 0.45rem; margin-left: 0.2rem;"></i>
    </div>
  </div>

  <!-- main grid -->
  <div class="booking-grid">
    <!-- LEFT: form -->
    <div class="form-section">
      <h2><i class="fas fa-pen-alt"></i> Flight details</h2>
      <form id="flightBookingForm">
        <div class="form-group">
          <label><i class="fas fa-city"></i> From</label>
          <input type="text" id="fromCity" placeholder="e.g. New York" value="Hyderabad" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-location-dot"></i> To</label>
          <input type="text" id="toCity" placeholder="e.g. Dubai" value="Dubai" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-calendar-day"></i> Departure</label>
            <input type="date" id="departureDate" value="2026-07-15" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-people-group"></i> Passengers</label>
            <select id="passengers">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label><i class="fas fa-tag"></i> Travel class</label>
          <select id="travelClass">
            <option value="Economy">Economy</option>
            <option value="Business" selected>Business</option>
            <option value="First">First Class</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom: 0.6rem;">
          <label><i class="fas fa-user"></i> Full name (for ticket)</label>
          <input type="text" id="passengerName" placeholder="e.g. Riya Sharma" value="Riya Sharma" required>
        </div>
        <button type="submit" class="book-btn" id="bookFlightBtn">
          <i class="fas fa-ticket-alt"></i> Book Flight
        </button>
      </form>
    </div>

    <!-- RIGHT: summary card -->
    <div class="summary-card">
      <h2><i class="fas fa-receipt"></i> Your trip</h2>
      <div class="flight-preview" id="flightSummary">
        <div class="flight-route">
          <span class="city" id="summaryFrom">Hyderabad</span>
          <span class="arrow"><i class="fas fa-arrow-right"></i></span>
          <span class="city" id="summaryTo">Dubai</span>
        </div>
        <div class="flight-detail-item">
          <span class="label"><i class="far fa-calendar-alt"></i> Departure</span>
          <span class="value" id="summaryDate">15 Jul 2026</span>
        </div>
        <div class="flight-detail-item">
          <span class="label"><i class="fas fa-users"></i> Passengers</span>
          <span class="value" id="summaryPax">2</span>
        </div>
        <div class="flight-detail-item">
          <span class="label"><i class="fas fa-crown"></i> Class</span>
          <span class="value" id="summaryClass">Business</span>
        </div>
        <div class="flight-detail-item" style="border-bottom: none; padding-bottom: 0.2rem;">
          <span class="label"><i class="fas fa-user"></i> Passenger</span>
          <span class="value" id="summaryName">Riya Sharma</span>
        </div>
        <div style="margin-top: 0.8rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
          <span class="passenger-tag"><i class="fas fa-check-circle" style="color: #1a6bdf;"></i> e-ticket ready</span>
          <span class="passenger-tag"><i class="fas fa-bag"></i> 30kg baggage</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL (congrats popup) -->
<div class="modal-overlay" id="congratsModal">
  <div class="modal-box">
    <div class="icon-big"><i class="fas fa-check"></i></div>
    <h2>🎉 Congratulations!</h2>
    <p>Your flight has been booked successfully.</p>
    <div class="ref-code"><i class="fas fa-ticket-alt"></i> SKY-7A9F-2D4</div>
    <p style="font-size: 0.9rem; margin-bottom: 0.8rem;">
      <i class="fas fa-envelope"></i> Confirmation sent to your email
    </p>
    <button class="modal-btn" id="closeModalBtn"><i class="fas fa-thumbs-up"></i> Awesome!</button>
  </div>
</div>

<script>
  (function() {
    const form = document.getElementById('flightBookingForm');
    const modal = document.getElementById('congratsModal');
    const closeBtn = document.getElementById('closeModalBtn');

    // summary elements
    const sumFrom = document.getElementById('summaryFrom');
    const sumTo = document.getElementById('summaryTo');
    const sumDate = document.getElementById('summaryDate');
    const sumPax = document.getElementById('summaryPax');
    const sumClass = document.getElementById('summaryClass');
    const sumName = document.getElementById('summaryName');

    // real-time update summary (on any change)
    function updateSummary() {
      const from = document.getElementById('fromCity').value.trim() || 'Hyderabad';
      const to = document.getElementById('toCity').value.trim() || 'Dubai';
      const dateRaw = document.getElementById('departureDate').value;
      const pax = document.getElementById('passengers').value;
      const cls = document.getElementById('travelClass').value;
      const name = document.getElementById('passengerName').value.trim() || 'Guest';

      sumFrom.textContent = from;
      sumTo.textContent = to;
      // format date
      if (dateRaw) {
        const d = new Date(dateRaw + 'T00:00:00');
        sumDate.textContent = d.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
      } else {
        sumDate.textContent = '—';
      }
      sumPax.textContent = pax;
      sumClass.textContent = cls;
      sumName.textContent = name;
    }

    // attach input events to update summary live
    const inputs = ['fromCity', 'toCity', 'departureDate', 'passengers', 'travelClass', 'passengerName'];
    inputs.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', updateSummary);
        el.addEventListener('change', updateSummary);
      }
    });

    // initial update
    updateSummary();

    // BOOK FLIGHT — show modal with congrats
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // additional: you could validate fields here
      const name = document.getElementById('passengerName').value.trim();
      if (!name) {
        alert('Please enter passenger name.');
        return;
      }

      // show modal
      modal.classList.add('active');
      // generate random ref code (just for fun)
      const ref = document.querySelector('.ref-code');
      if (ref) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = 'SKY-';
        for (let i = 0; i < 8; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
          if (i === 3) code += '-';
        }
        ref.innerHTML = `<i class="fas fa-ticket-alt"></i> ${code}`;
      }

      // update modal with passenger name
      const modalP = document.querySelector('.modal-box p');
      if (modalP) {
        // we keep the default, but we can add a personalized line
        // just for touch: 
      }
    });

    // close modal
    function closeModal() {
      modal.classList.remove('active');
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModal();
    });

    // also close with ESC
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        closeModal();
      }
    });

    // extra: update summary on any change
    console.log('✈️ SkyBook ready — book your flight!');
  })();
</script>

</body>
</html>
