<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🐳 Docker Project</h1>
        <p>Containerizing Applications with Docker</p>
    </header>

    <section class="workflow">
        <h2>Docker Workflow</h2>

        <div class="cards">

            <div class="card">
                <img src="images/docker.png" alt="Docker">
                <h3>Docker</h3>
            </div>

            <div class="card">
                <img src="images/dockerfile.png" alt="Dockerfile">
                <h3>Dockerfile</h3>
            </div>

            <div class="card">
                <img src="images/image.png" alt="Image">
                <h3>Docker Image</h3>
            </div>

            <div class="card">
                <img src="images/container.png" alt="Container">
                <h3>Container</h3>
            </div>

            <div class="card">
                <img src="images/dockerhub.png" alt="Docker Hub">
                <h3>Docker Hub</h3>
            </div>

        </div>

        <h2>Pipeline Flow</h2>

        <p>
            Source Code ➜ Dockerfile ➜ Docker Image ➜ Docker Container ➜ Docker Hub
        </p>

    </section>

    <footer>
        <p>Created by Jayaram Behara</p>
    </footer>

</body>
</html>
